<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f4f4f4;
        }

        .card {
            background: white;
            padding: 20px;
            margin: 50px auto;
            width: 400px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        .bar {
            width: 100%;
            background: #ddd;
            border-radius: 20px;
        }

        .fill {
            height: 25px;
            color: white;
            line-height: 25px;
            border-radius: 20px;
        }

        .malicious {
            background-color: red;
        }

        .normal {
            background-color: green;
        }

        a {
            margin: 10px;
        }
    </style>

</head>

<body>

<div class="card">

<h2>Prediction Result</h2>

<h3>
    {% if prediction_text == "Malicious" %}
        ⚠ Malicious Attack Detected
    {% elif prediction_text == "Normal" %}
        ✔ Normal Request
    {% else %}
        ❌ Error
    {% endif %}
</h3>

<!-- Visualization -->
<div class="bar">
    <div class="fill {% if prediction_text == 'Malicious' %}malicious{% else %}normal{% endif %}"
         style="width: {{ confidence }}%;">
        {{ confidence }}%
    </div>
</div>

<br>

<a href="/">Home</a>
<a href="/predict_page">Try Again</a>

</div>

</body>
</html>
