<!DOCTYPE html>
<html>
<head>
    <title>Web Attack Detection</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            color: white;
            text-align: center;
        }

        .container {
            margin-top: 100px;
        }

        h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        p {
            font-size: 18px;
            margin-bottom: 30px;
            color: #ddd;
        }

        .btn {
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 30px;
            background-color: #ff9800;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: #e68900;
            transform: scale(1.05);
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
            width: 400px;
            margin: auto;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.3);
        }

        footer {
            position: absolute;
            bottom: 10px;
            width: 100%;
            font-size: 14px;
            color: #ccc;
        }
    </style>

</head>

<body>

<div class="container">

    <div class="card">

        <h1>🔐 Web Attack Detection</h1>

        <p>
            Detect malicious web requests using Machine Learning techniques.
        </p>

        <a href="/predict_page">
            <button class="btn">Start Detection </button>
        </a>

    </div>

</div>

<footer>
    Developed using Machine Learning | Final Year Project
</footer>

</body>
</html>
