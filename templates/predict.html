<!DOCTYPE html>
<html>
<head>
    <title>Prediction</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            color: white;
            text-align: center;
        }

        .container {
            margin-top: 50px;
        }

        h2 {
            margin-bottom: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
            width: 400px;
            margin: auto;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.3);
        }

        input {
            width: 85%;
            padding: 10px;
            margin: 8px;
            border: none;
            border-radius: 8px;
            outline: none;
        }

        button {
            margin-top: 15px;
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            background-color: #ff9800;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #e68900;
            transform: scale(1.05);
        }

        .back {
            margin-top: 15px;
            display: block;
            color: #ddd;
            text-decoration: none;
        }

        .back:hover {
            color: white;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>🔍 Enter Request Features</h2>

    <div class="card">

        <form action="/predict" method="post">

            <input type="text" name="f1" placeholder="Query Length " required><br>
            <input type="text" name="f2" placeholder="Word Count " required><br>
            <input type="text" name="f3" placeholder="Special Char Count " required><br>
            <input type="text" name="f4" placeholder="Digit Count " required><br>
            <input type="text" name="f5" placeholder="Contains SELECT " required><br>

            <button type="submit">Predict </button>

        </form>

    </div>

    <a href="/" class="back">⬅ Back to Home</a>

</div>

</body>
</html>
